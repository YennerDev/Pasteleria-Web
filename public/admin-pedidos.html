<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Admin Pedidos</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
padding:30px;
}

table{
width:100%;
border-collapse: collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#c53030;
}

button{
padding:6px 10px;
cursor:pointer;
}

</style>

</head>
<body>

<h1>📦 Pedidos de Clientes</h1>

<table>

<thead>

<tr>
<th>ID</th>
<th>Producto</th>
<th>Cliente</th>
<th>Teléfono</th>
<th>Fecha</th>
</tr>

</thead>

<tbody id="tablaPedidos">

</tbody>

</table>

<script>

async function cargarPedidos(){

const res = await fetch("/api/pedidos");

const pedidos = await res.json();

const tabla = document.getElementById("tablaPedidos");

tabla.innerHTML = "";

pedidos.forEach(p => {

tabla.innerHTML += `
<tr>
<td>${p.id}</td>
<td>${p.producto}</td>
<td>${p.cliente}</td>
<td>${p.telefono}</td>
<td>${new Date(p.fecha).toLocaleString()}</td>
</tr>
`;

});

}

cargarPedidos();

</script>

</body>
</html>
